<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Reader</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 4h10l4 4v12H5z" /><path d="M15 4v5h4" /><path d="M8 13h8" /><path d="M8 17h5" /></svg>
          </div>
          <div>
            <div class="brand-title">Codex Reader</div>
            <div class="document-title" id="documentTitle">No document selected</div>
          </div>
        </div>

        <div class="status-strip" aria-live="polite">
          <span class="status-pill" id="serverStatus"><span></span>MacBook offline</span>
          <span class="status-pill" id="codexStatus"><span></span>Codex unknown</span>
          <span class="status-pill" id="tunnelStatus"><span></span>Tunnel offline</span>
          <span class="status-pill" id="queueStatus"><span></span>Queue idle</span>
        </div>

        <div class="top-actions">
          <button class="button secondary" id="analyzePageButton" disabled>
            <svg viewBox="0 0 24 24"><path d="M8 5h8" /><path d="M8 12h8" /><path d="M8 19h5" /></svg>
            Analyze Page
          </button>
          <button class="button primary" id="analyzeDocumentButton" disabled>
            <svg viewBox="0 0 24 24"><path d="M4 6h16" /><path d="M4 12h16" /><path d="M4 18h10" /></svg>
            Analyze Document
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="source-rail">
          <form class="upload-zone" id="uploadForm">
            <input id="pdfInput" name="file" type="file" accept="application/pdf,.pdf" />
            <button class="button primary full" type="button" id="pickPdfButton">
              <svg viewBox="0 0 24 24"><path d="M12 5v14" /><path d="M5 12h14" /></svg>
              Upload PDF
            </button>
          </form>

          <form class="url-form" id="urlForm">
            <input id="urlInput" type="url" placeholder="https://example.com/article" />
            <button class="icon-button" type="submit" title="Import webpage" aria-label="Import webpage">
              <svg viewBox="0 0 24 24"><path d="M5 12h14" /><path d="m13 6 6 6-6 6" /></svg>
            </button>
          </form>

          <div class="rail-heading">Documents</div>
          <div class="document-list" id="documentList"></div>
        </aside>

        <section class="reader-pane">
          <div class="reader-toolbar">
            <div class="pager">
              <button class="icon-button" id="prevPageButton" title="Previous page" aria-label="Previous page">
                <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6" /></svg>
              </button>
              <span id="pageIndicator">Page 0 / 0</span>
              <button class="icon-button" id="nextPageButton" title="Next page" aria-label="Next page">
                <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" /></svg>
              </button>
            </div>

            <div class="toolbar-cluster">
              <label class="search-field">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6" /><path d="m16 16 4 4" /></svg>
                <input id="searchInput" type="search" placeholder="Search text" />
              </label>
              <button class="icon-button" id="zoomOutButton" title="Zoom out" aria-label="Zoom out">
                <svg viewBox="0 0 24 24"><path d="M5 12h14" /></svg>
              </button>
              <button class="icon-button" id="zoomInButton" title="Zoom in" aria-label="Zoom in">
                <svg viewBox="0 0 24 24"><path d="M12 5v14" /><path d="M5 12h14" /></svg>
              </button>
            </div>
          </div>

          <div class="viewer-grid">
            <iframe class="pdf-preview" id="pdfPreview" title="PDF preview"></iframe>
            <article class="reader-surface" id="readerSurface">
              <div class="empty-state">
                <div class="empty-mark" aria-hidden="true"></div>
                <h1>Ready</h1>
                <p>Upload a PDF or import a webpage.</p>
              </div>
            </article>
          </div>

          <div class="selection-popup" id="selectionPopup" hidden>
            <button class="button compact" id="explainButton">
              <svg viewBox="0 0 24 24"><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z" /></svg>
              Explain
            </button>
            <button class="button compact danger" id="factCheckButton">
              <svg viewBox="0 0 24 24"><path d="M12 3 4 7v6c0 5 3.5 7.5 8 8 4.5-.5 8-3 8-8V7z" /><path d="m9 12 2 2 4-5" /></svg>
              Fact-check
            </button>
          </div>
        </section>

        <aside class="analysis-pane">
          <section class="analysis-section">
            <div class="section-title">Summary</div>
            <div class="section-body" id="summarySection">Ready to analyze</div>
          </section>

          <section class="analysis-section">
            <div class="section-title">Terms</div>
            <div class="term-list" id="termsSection"></div>
          </section>

          <section class="analysis-section">
            <div class="section-title">Translation</div>
            <div class="section-body" id="translationSection"></div>
          </section>

          <section class="analysis-section">
            <div class="section-title">Follow-up Questions</div>
            <ol class="question-list" id="questionsSection"></ol>
          </section>

          <section class="analysis-section">
            <div class="section-title">Selection Jobs</div>
            <div class="job-list" id="selectionJobsSection"></div>
          </section>

          <section class="analysis-section">
            <div class="section-title">Sources</div>
            <div class="source-list" id="sourcesSection"></div>
          </section>
        </aside>
      </main>
    </div>

    <div class="toast-stack" id="toastStack" aria-live="polite"></div>
    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
